<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Teleprompter</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body { font-family: Georgia, 'Times New Roman', serif; color: #fff; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    width: 100%;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 6px;
    background: #333;
    border-radius: 3px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e74c3c;
    margin-top: -11px;
    border: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-track {
    height: 6px;
    background: #333;
    border-radius: 3px;
    border: none;
  }
  input[type="range"]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e74c3c;
    border: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.08); }
  }

  .tp-btn {
    padding: 12px 18px;
    background: transparent;
    color: #aaa;
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-family: system-ui, -apple-system, sans-serif;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .tp-btn-active {
    background: #e74c3c;
    color: #fff;
    border-color: #e74c3c;
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
  function fixHeight() {
    document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    document.getElementById('root').style.height = window.innerHeight + 'px';
  }
  fixHeight();
  window.addEventListener('resize', fixHeight);
  window.addEventListener('orientationchange', function() { setTimeout(fixHeight, 200); });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useRef, useEffect, useCallback } = React;
const e = React.createElement;

const sb = supabase.createClient(
  'https://kbcusexevnqsxbhqtcqv.supabase.co',
  'sb_publishable_WaDZ9MUT62ADegxEG9IvZg_qAsbuSPn'
);

function syncUp(data) {
  console.log('syncUp', data);
  sb.from('teleprompter_rooms').update(data).eq('id', 'main')
    .then(({ error }) => { if (error) console.error('syncUp error:', error); });
}

function Teleprompter() {
  const [script, setScript] = useState('');
  const [isEditing, setIsEditing] = useState(false);
  const [editBuffer, setEditBuffer] = useState('');
  const [isScrolling, setIsScrolling] = useState(false);
  const [speed, setSpeed] = useState(3);
  const [fontSize, setFontSize] = useState(42);
  const [mirrored, setMirrored] = useState(false);
  const [scrollProgress, setScrollProgress] = useState(0);
  const [countdown, setCountdown] = useState(null);
  const [isFullscreen, setIsFullscreen] = useState(false);

  const offsetRef = useRef(0);
  const [offset, setOffset] = useState(0);
  const animRef = useRef(null);
  const lastTimeRef = useRef(null);
  const countdownRef = useRef(null);
  const containerRef = useRef(null);
  const textRef = useRef(null);
  const viewportRef = useRef(null);
  const syncDebounce = useRef(null);
  const resetCounterRef = useRef(0);
  const lastResetCounter = useRef(0);

  // Load initial state and subscribe to real-time changes
  useEffect(() => {
    sb.from('teleprompter_rooms').select('*').eq('id', 'main').single().then(({ data }) => {
      if (data) {
        setScript(data.script || '');
        setSpeed(data.speed || 3);
        setFontSize(data.font_size || 42);
        resetCounterRef.current = data.reset_counter || 0;
        lastResetCounter.current = data.reset_counter || 0;
      }
    });

    const channel = sb.channel('room:main')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'teleprompter_rooms', filter: 'id=eq.main' }, ({ new: d }) => {
        setScript(d.script || '');
        setSpeed(d.speed || 3);
        setFontSize(d.font_size || 42);
        setIsScrolling(!!d.is_scrolling);
        if (d.reset_counter !== lastResetCounter.current) {
          lastResetCounter.current = d.reset_counter;
          resetCounterRef.current = d.reset_counter;
          if (animRef.current) cancelAnimationFrame(animRef.current);
          if (countdownRef.current) clearTimeout(countdownRef.current);
          setCountdown(null);
          offsetRef.current = 0;
          setOffset(0);
          setScrollProgress(0);
          if (textRef.current) textRef.current.style.transform = 'translateY(0px)';
        }
      })
      .subscribe();

    return () => { sb.removeChannel(channel); };
  }, []);

  const speedPxPerSec = speed * 18;

  const getMaxOffset = useCallback(() => {
    if (!textRef.current || !viewportRef.current) return 0;
    return Math.max(0, textRef.current.scrollHeight - viewportRef.current.clientHeight);
  }, []);

  const doScroll = useCallback((timestamp) => {
    if (lastTimeRef.current === null) lastTimeRef.current = timestamp;
    const delta = (timestamp - lastTimeRef.current) / 1000;
    lastTimeRef.current = timestamp;

    const maxOffset = getMaxOffset();
    offsetRef.current = Math.min(offsetRef.current + speedPxPerSec * delta, maxOffset);

    if (textRef.current) {
      textRef.current.style.transform = (mirrored ? 'scaleX(-1) ' : '') + 'translateY(' + (-offsetRef.current) + 'px)';
    }

    setScrollProgress(maxOffset > 0 ? offsetRef.current / maxOffset : 0);

    if (offsetRef.current >= maxOffset) {
      setIsScrolling(false);
      setOffset(offsetRef.current);
      syncUp({ is_scrolling: false });
      return;
    }
    animRef.current = requestAnimationFrame(doScroll);
  }, [speedPxPerSec, getMaxOffset, mirrored]);

  useEffect(() => {
    if (isScrolling) {
      lastTimeRef.current = null;
      animRef.current = requestAnimationFrame(doScroll);
    } else {
      if (animRef.current) cancelAnimationFrame(animRef.current);
    }
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [isScrolling, doScroll]);

  const startCountdown = () => {
    if (isScrolling || countdown !== null) return;
    setCountdown(5);
  };

  useEffect(() => {
    if (countdown === null) return;
    if (countdown === 0) { setCountdown(null); setIsScrolling(true); syncUp({ is_scrolling: true }); return; }
    countdownRef.current = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(countdownRef.current);
  }, [countdown]);

  const cancelCountdown = () => {
    setCountdown(null);
    if (countdownRef.current) clearTimeout(countdownRef.current);
  };

  const handlePlayPause = () => {
    if (countdown !== null) { cancelCountdown(); syncUp({ is_scrolling: false }); return; }
    if (isScrolling) { setIsScrolling(false); setOffset(offsetRef.current); syncUp({ is_scrolling: false }); }
    else { startCountdown(); }
  };

  const handleReset = () => {
    setIsScrolling(false);
    cancelCountdown();
    offsetRef.current = 0;
    setOffset(0);
    setScrollProgress(0);
    if (textRef.current) textRef.current.style.transform = 'translateY(0px)';
    resetCounterRef.current += 1;
    syncUp({ is_scrolling: false, reset_counter: resetCounterRef.current });
  };

  const handleSaveScript = () => {
    setScript(editBuffer);
    setIsEditing(false);
    handleReset();
    syncUp({ script: editBuffer });
  };

  const handleSpeedChange = (val) => {
    setSpeed(val);
    if (syncDebounce.current) clearTimeout(syncDebounce.current);
    syncDebounce.current = setTimeout(() => syncUp({ speed: val }), 300);
  };

  const handleFontSizeChange = (val) => {
    setFontSize(val);
    if (syncDebounce.current) clearTimeout(syncDebounce.current);
    syncDebounce.current = setTimeout(() => syncUp({ font_size: val }), 300);
  };

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      containerRef.current && containerRef.current.requestFullscreen && containerRef.current.requestFullscreen().then(() => setIsFullscreen(true)).catch(() => {});
    } else {
      document.exitFullscreen && document.exitFullscreen().then(() => setIsFullscreen(false)).catch(() => {});
    }
  };

  useEffect(() => {
    const handler = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', handler);
    return () => document.removeEventListener('fullscreenchange', handler);
  }, []);

  const pct = (scrollProgress * 100).toFixed(1) + '%';

  // --- EDITING VIEW ---
  if (isEditing) {
    return e('div', { ref: containerRef, style: { width: '100%', height: '100%', background: '#000', color: '#fff', display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '24px 32px' } },
      e('div', { style: { color: '#aaa', fontSize: 13, marginBottom: 12, fontFamily: 'system-ui, sans-serif', letterSpacing: '0.05em', textTransform: 'uppercase' } }, 'Paste or type your script below'),
      e('textarea', {
        value: editBuffer,
        onChange: (ev) => setEditBuffer(ev.target.value),
        autoFocus: true,
        style: { flex: 1, background: '#111', color: '#f0f0f0', border: '1px solid #333', borderRadius: 8, padding: 20, fontSize: 18, fontFamily: 'Georgia, serif', lineHeight: 1.7, resize: 'none', outline: 'none' }
      }),
      e('div', { style: { display: 'flex', gap: 12, marginTop: 16, justifyContent: 'flex-end' } },
        e('button', { onClick: () => setIsEditing(false), className: 'tp-btn' }, 'Cancel'),
        e('button', { onClick: handleSaveScript, className: 'tp-btn', style: { background: '#e74c3c', color: '#fff', borderColor: '#e74c3c', fontWeight: 600 } }, 'Save Script')
      )
    );
  }

  // --- MAIN VIEW ---
  return e('div', { ref: containerRef, style: { width: '100%', height: '100%', background: '#000', color: '#fff', fontFamily: "Georgia, 'Times New Roman', serif", display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' } },

    // Progress bar
    e('div', { style: { position: 'absolute', top: 0, left: 0, width: pct, height: 3, background: '#e74c3c', zIndex: 20 } }),

    // Guide lines
    countdown === null && e(React.Fragment, null,
      e('div', { style: { position: 'absolute', top: '42%', left: 0, right: 0, height: 1, background: 'rgba(231,76,60,0.25)', zIndex: 10, pointerEvents: 'none' } }),
      e('div', { style: { position: 'absolute', top: '54%', left: 0, right: 0, height: 1, background: 'rgba(231,76,60,0.25)', zIndex: 10, pointerEvents: 'none' } }),
      e('div', { style: { position: 'absolute', top: '47%', left: 12, zIndex: 10, pointerEvents: 'none', color: 'rgba(231,76,60,0.5)', fontSize: 22 } }, '▶')
    ),

    // Countdown corner badge
    countdown !== null && e('div', { style: { position: 'absolute', top: 20, right: 24, zIndex: 30, display: 'flex', flexDirection: 'column', alignItems: 'center', pointerEvents: 'none', background: 'rgba(0,0,0,0.6)', borderRadius: 16, padding: '10px 20px' } },
      e('div', { style: { fontSize: 96, fontWeight: 200, fontFamily: 'system-ui, sans-serif', color: '#e74c3c', lineHeight: 1, animation: 'pulse 1s ease-in-out infinite' } }, countdown),
      e('div', { style: { fontSize: 13, color: '#666', fontFamily: 'system-ui, sans-serif', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 4 } }, 'get ready')
    ),

    // Scrolling text viewport
    e('div', { ref: viewportRef, style: { flex: 1, overflow: 'hidden', padding: '0 48px', position: 'relative' } },
      e('div', { ref: textRef, style: { willChange: 'transform', transform: mirrored ? 'scaleX(-1) translateY(' + (-offset) + 'px)' : 'translateY(' + (-offset) + 'px)', backfaceVisibility: 'hidden' } },
        e('div', { style: { height: '45vh' } }),
        e('div', { style: { fontSize, lineHeight: 1.65, fontWeight: 400, letterSpacing: '0.01em', maxWidth: 900, margin: '0 auto', whiteSpace: 'pre-wrap', wordBreak: 'break-word', textShadow: '0 0 20px rgba(255,255,255,0.08)' } }, script),
        e('div', { style: { height: '55vh' } })
      )
    ),

    // Control bar
    e('div', { style: { background: 'rgba(17,17,17,0.95)', backdropFilter: 'blur(12px)', borderTop: '1px solid #222', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 14, fontFamily: 'system-ui, sans-serif', zIndex: 15 } },

      e('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
          e('span', { style: { color: '#888', fontSize: 15, minWidth: 52 } }, 'Speed'),
          e('input', { type: 'range', min: 1, max: 10, step: 0.5, value: speed, onChange: (ev) => handleSpeedChange(parseFloat(ev.target.value)), style: { flex: 1, height: 36 } }),
          e('span', { style: { color: '#ccc', fontSize: 16, fontWeight: 600, fontVariantNumeric: 'tabular-nums', minWidth: 32, textAlign: 'right' } }, speed)
        ),
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
          e('span', { style: { color: '#888', fontSize: 15, minWidth: 52 } }, 'Size'),
          e('input', { type: 'range', min: 24, max: 72, step: 2, value: fontSize, onChange: (ev) => handleFontSizeChange(parseInt(ev.target.value)), style: { flex: 1, height: 36 } }),
          e('span', { style: { color: '#ccc', fontSize: 16, fontWeight: 600, fontVariantNumeric: 'tabular-nums', minWidth: 42, textAlign: 'right' } }, fontSize + 'px')
        )
      ),

      e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' } },
        e('button', { onClick: handlePlayPause, style: { width: 56, height: 56, borderRadius: '50%', background: (isScrolling || countdown !== null) ? '#c0392b' : '#e74c3c', color: '#fff', border: 'none', cursor: 'pointer', fontSize: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, WebkitTapHighlightColor: 'transparent' } }, (isScrolling || countdown !== null) ? '⏸' : '▶'),
        e('button', { onClick: handleReset, className: 'tp-btn' }, 'Reset'),
        e('button', { onClick: () => setMirrored(!mirrored), className: 'tp-btn' + (mirrored ? ' tp-btn-active' : '') }, 'Mirror'),
        e('button', { onClick: toggleFullscreen, className: 'tp-btn' + (isFullscreen ? ' tp-btn-active' : '') }, isFullscreen ? 'Exit ⛶' : 'Fullscreen ⛶'),
        e('button', { onClick: () => { setEditBuffer(script); setIsEditing(true); setIsScrolling(false); cancelCountdown(); }, className: 'tp-btn' }, 'Edit Script')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(Teleprompter));
</script>
</body>
</html>
